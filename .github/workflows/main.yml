name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install TypeScript dependencies
        run: npm install

      - name: Compile TypeScript plugin
        run: npx tsc

      - name: Build Go binaries
        run: |
          cd go
          # Linux (amd64)
          GOOS=linux GOARCH=amd64 go build -o ../signer-linux-x64 main.go
          # macOS (Intel)
          GOOS=darwin GOARCH=amd64 go build -o ../signer-macos-x64 main.go
          # macOS (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -o ../signer-macos-arm64 main.go
          # Windows (amd64)
          GOOS=windows GOARCH=amd64 go build -o ../signer-windows-x64.exe main.go

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            signer-linux-x64
            signer-macos-x64
            signer-macos-arm64
            signer-windows-x64.exe
          generate_release_notes: true
